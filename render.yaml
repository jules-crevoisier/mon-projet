services:
  - type: web
    name: wr406d-sportcars-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile.render
    healthCheckPath: /api
    envVars:
      - key: APP_ENV
        value: prod
      - key: APP_DEBUG
        value: "0"
      - key: APP_SECRET
        generateValue: true
      - key: DATABASE_URL_BASE
        fromDatabase:
          name: wr406d-sportcars-db
          property: connectionString
      - key: CORS_ALLOW_ORIGIN
        value: ^https://wr406d-sportcars-front\.onrender\.com$

  - type: web
    name: wr406d-sportcars-front
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://wr406d-sportcars-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: wr406d-sportcars-db
    databaseName: wr406d_sportcars
    user: wr406d_sportcars
    plan: free
    region: frankfurt
